[toolchain]
package_manager = "pnpm"

[features]
resolution = true
skip-lint = false

[programs.localnet]
shingo_program = "BsW6tsgxPVpdCeSwMdmtDiVdkVZspAT7Rd6DyW2o2iTj"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "localnet"
wallet = "./programs/test_keypair.json"

[scripts]
test = "pnpm vitest --run programs/*.{spec,test}.ts"

[test]
startup_wait = 5000
shutdown_wait = 2000
upgradeable = false
